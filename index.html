<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gmail 열기</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    background: #0f172a;
    color: #f8fafc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  .box { padding: 24px; max-width: 360px; width: 100%; }
  .emoji { font-size: 56px; margin-bottom: 16px; }
  .msg { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .sub { font-size: 14px; color: #94a3b8; margin-bottom: 28px; line-height: 1.5; }
  .btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    margin: 12px 0;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn-primary {
    background: #fbbf24;
    color: #0f172a;
  }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #e2e8f0;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .hint {
    margin-top: 24px;
    padding: 12px;
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 8px;
    font-size: 12px;
    color: #fde68a;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="box">
  <div class="emoji">📧</div>
  <div class="msg">Gmail 앱 열기</div>
  <div class="sub">자동으로 열리지 않으면 아래 버튼을 눌러주세요</div>

  <a id="primaryBtn" class="btn btn-primary" href="https://mail.google.com/mail/u/0/#drafts">📨 Gmail 열기</a>
  <a id="appBtn" class="btn btn-secondary" href="googlegmail://" style="display:none;">앱으로 직접 열기</a>

  <div class="hint" id="kakaoHint" style="display:none;">
    💡 카카오톡에서 열린 경우, 우측 상단 <b>⋯</b> 메뉴에서 <b>"다른 브라우저로 열기"</b>를 누르면 더 안정적입니다.
  </div>
</div>
<script>
  (function() {
    var ua = navigator.userAgent || navigator.vendor || window.opera || '';
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /android/i.test(ua);
    var isKakao = /kakaotalk/i.test(ua);

    var appBtn = document.getElementById('appBtn');
    var primaryBtn = document.getElementById('primaryBtn');
    var kakaoHint = document.getElementById('kakaoHint');

    // 모바일이면 앱 직접 열기 버튼 노출
    if (isIOS || isAndroid) {
      appBtn.style.display = 'block';
      if (isAndroid) {
        appBtn.setAttribute(
          'href',
          'intent://mail.google.com/mail/u/0/%23drafts#Intent;scheme=https;package=com.google.android.gm;end'
        );
      }
    }

    // 카톡 인앱 브라우저면 힌트 표시
    if (isKakao) {
      kakaoHint.style.display = 'block';
    }

    // 자동 리다이렉트 시도 (카톡 인앱 브라우저에선 막힐 수 있음)
    if (!isKakao) {
      if (isIOS) {
        window.location.replace("googlegmail://");
        setTimeout(function() {
          window.location.replace("https://mail.google.com/mail/u/0/#drafts");
        }, 1500);
      } else if (isAndroid) {
        window.location.replace(
          "intent://mail.google.com/mail/u/0/%23drafts#Intent;scheme=https;package=com.google.android.gm;end"
        );
        setTimeout(function() {
          window.location.replace("https://mail.google.com/mail/u/0/#drafts");
        }, 1500);
      } else {
        window.location.replace("https://mail.google.com/mail/u/0/#drafts");
      }
    }
  })();
</script>
</body>
</html>
